name: keep alive

# Pings the production API every 8h so Supabase free tier (which auto-pauses
# the project after 7 days of zero requests) never hits the inactivity window.

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: hit /api/stories
        run: curl -fsS https://sytt.vercel.app/api/stories > /dev/null
